ekf_filter_node:
  ros__parameters:
    frequency: 30.0          
    sensor_timeout: 0.1      
    two_d_mode: true         # this is because robot stays on ground plane (z=0)
    transform_time_offset: 0.0
    transform_timeout: 0.0

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom         # Used odom for now (need to switch to map for AMCL)

    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true

    odom0: /odom
    odom0_config: [false, false, false,   
                   false, false, false,   
                   true,  false, false,   
                   false, false, true,    
                   false, false, false]   

    odom0_queue_size: 10
    odom0_nodelay: false
    odom0_differential: false   
    odom0_relative: false

    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0

    # We have not used roll/pitch (robot is flat on ground in 2D mode)

    imu0: /imu
    imu0_config: [false, false, false,   
                  false, false, true,    
                  false, false, false,   
                  false, false, true,    
                  false, false, false]   

    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: true          
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true   

